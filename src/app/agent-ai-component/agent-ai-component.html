<div class="row">
    <div class="col-2"></div>
    <div class="col-8">
        <form [formGroup]="form" (ngSubmit)="submit()">

            <div class="form-group form-floating row">
                <div class="col-12">
                    <label class="form-label">Instruction</label>
                    <textarea
                        class="form-control"
                        rows="3"
                        formControlName="userInput"
                        placeholder="Register fertilizer expense for AU-14 last Friday for 1250 quetzales">
                        </textarea>
                </div>
            </div>

            <div class="form-group form-floating row">
                <div class="col-12">
                    <label class="form-label">Agricultural Unit (Optional)</label>
                    <input
                        type="text"
                        class="form-control"
                        formControlName="agriculturalUnit">
                </div>
            </div>

            <div class="form-group form-floating row">
                <div class="col-12">
                    <label class="form-label">Preferred Currency</label>
                    <select class="form-select" formControlName="preferredCurrency">
                        <option value="GTQ">GTQ</option>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                    </select>
                </div>

            </div>

            <button class="btn btn-primary" [disabled]="loading">
                {{ loading ? 'Processing...' : 'Send to AI' }}
            </button>

        </form>

        @if(response !== null){
            <pre>
                {{response | json}}
            </pre>
        }
    </div>
    <div class="col-2"></div>
</div>
