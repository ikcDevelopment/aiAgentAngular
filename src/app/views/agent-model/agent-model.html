<div class="row">
    <div class="col-12">
        {{msg}}
    </div>
</div>
<div class="row">
    <div class="col-4">
        <button class="btn btn-primary" (click)="submit()">Subir datos</button>
    </div>
    <div class="col-8"></div>
</div>
<div class="row">
    <div class="col-12">
        <form [formGroup]="form">
            <div class="form-group form-floating row">
                <div class="col-12">
                    <div class="col-12">
                        <label class="form-label">Modelo</label>
                        <input
                            type="text"
                            class="form-control"
                            formControlName="modelo">
                    </div>
                </div>
            </div>

            <div class="form-group form-floating row">
                <div class="col-12">
                    <div class="col-12">
                        <label class="form-label">Temperatua</label>
                        <input
                            type="number"
                            class="form-control"
                            formControlName="temperature">
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
